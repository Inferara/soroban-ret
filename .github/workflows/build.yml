name: Build

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
        with:
          # Reference sources for the accuracy harness's end-to-end tests.
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets --locked

  # Heavy, wasm-toolchain gates that are env-gated (skipped by the default
  # `cargo test` above). Enforced here so compile-back, corpus-soundness, and
  # functional-equivalence run on every PR — previously they were opt-in only.
  heavy-gates:
    name: Heavy gates (compile-back, corpus, equivalence)
    runs-on: ubuntu-latest
    # NOT `-D warnings`: these gates recompile decompiled output, which carries
    # benign warnings (unused vars/imports) that must not fail the recompile.
    # Lint enforcement is the `build` job's responsibility.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (+ wasm32v1-none)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Compile-back, corpus-soundness, and functional-equivalence gates
        env:
          SOROBAN_RET_COMPILE_BACK: "1"
          SOROBAN_RET_CORPUS_SOUNDNESS: "1"
          SOROBAN_RET_EQUIV: "1"
        run: cargo test --workspace --locked -- --nocapture
