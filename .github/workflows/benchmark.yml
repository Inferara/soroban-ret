name: Benchmark

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Report-only: renders the per-contract restoration table + improved/reduced/
  # no-change verdict to the job summary and a sticky PR comment, and uploads the
  # full HTML report as an artifact. Benchmark regressions never fail the check
  # (build or runtime errors still do).
  benchmark:
    name: Restoration benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        # No submodules: the benchmark only needs benchmark-data/ + the core crate.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Build benchmark
        run: cargo build --release -p soroban-ret-bench --locked

      - name: Run benchmark
        run: |
          ./target/release/bench \
            --corpus benchmark-data/mainnet \
            --against benchmark-data/baseline.json \
            --json benchmark-results.json \
            --html benchmark-report.html \
            --markdown > benchmark-summary.md
          cat benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmark-report.html
            benchmark-results.json

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        # Fork PRs get a read-only token; don't fail the (report-only) check if
        # the comment can't be posted — the job summary + artifact still apply.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('benchmark-summary.md', 'utf8');
            const marker = '<!-- soroban-ret-bench -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // Paginate: the marker comment may not be on the first page once the
            // PR accumulates >30 comments.
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # main only: regenerate and commit the trimmed baseline so subsequent PRs diff
  # against the latest numbers. Skips CI on its own commit to avoid loops.
  update-baseline:
    name: Refresh baseline (main)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Regenerate baseline
        run: bash scripts/rebuild-benchmark-baseline.sh

      - name: Commit if changed
        run: |
          if git diff --quiet -- benchmark-data/baseline.json; then
            echo "Baseline unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add benchmark-data/baseline.json
            git commit -m "chore: refresh benchmark baseline [skip ci]"
            git push
          fi
