name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Resolve target version
        id: ver
        run: |
          v="${GITHUB_REF_NAME#v}"
          # Sanity-check: tag version must match workspace.package.version.
          ws_v="$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ "$v" != "$ws_v" ]]; then
            echo "tag version ($v) does not match workspace version ($ws_v)" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Verify workspace builds
        run: cargo build --workspace --locked --release

      - name: Run tests
        run: cargo test --workspace --locked

      # Idempotent publish: each step queries crates.io for the target version
      # and skips if it is already published. This makes the workflow safely
      # re-runnable when a previous run partially succeeded (e.g. lib published
      # but CLI failed). Re-running the same tag will only publish what is
      # missing.

      # Helper: query the sparse index (the surface cargo actually uses for
      # dependency resolution) for a specific version. The path layout for the
      # crates.io sparse index is `<aa>/<bb>/<crate>` where `<aa>` is the first
      # two letters of the crate name and `<bb>` is the next two. For both
      # `soroban-ret` and `soroban-ret-cli` that is `so/ro/<crate>`.

      - name: Publish soroban-ret (library)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_KEY }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          if curl -s "https://index.crates.io/so/ro/soroban-ret" | grep -q "\"vers\":\"$V\""; then
            echo "soroban-ret $V already in sparse index — skipping publish"
          else
            cargo publish -p soroban-ret --dry-run --locked
            cargo publish -p soroban-ret --locked
          fi

      - name: Wait for crates.io sparse index to publish soroban-ret
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          # Poll the sparse index — that is the surface cargo reads when
          # resolving the CLI's path-and-version dependency on the library.
          # Up to 10 minutes (60 * 10s) to absorb crates.io edge propagation
          # delays observed in the wild.
          for i in $(seq 1 60); do
            if curl -s "https://index.crates.io/so/ro/soroban-ret" | grep -q "\"vers\":\"$V\""; then
              echo "soroban-ret $V is in sparse index"
              exit 0
            fi
            sleep 10
          done
          echo "timed out waiting for soroban-ret $V to appear in sparse index" >&2
          exit 1

      - name: Publish soroban-ret-cli (binary)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_KEY }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          if curl -s "https://index.crates.io/so/ro/soroban-ret-cli" | grep -q "\"vers\":\"$V\""; then
            echo "soroban-ret-cli $V already in sparse index — skipping publish"
          else
            cargo publish -p soroban-ret-cli --dry-run --locked
            cargo publish -p soroban-ret-cli --locked
          fi
