name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index and target
        uses: Swatinem/rust-cache@v2

      - name: Verify workspace builds
        run: cargo build --workspace --locked --release

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Dry-run publish (library)
        run: cargo publish -p soroban-ret --dry-run --locked

      - name: Publish soroban-ret (library)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_KEY }}
        run: cargo publish -p soroban-ret --locked

      # crates.io needs a moment to index the freshly published library
      # before soroban-ret-cli can resolve it as a dependency.
      - name: Wait for crates.io to index soroban-ret
        run: sleep 45

      - name: Dry-run publish (CLI)
        run: cargo publish -p soroban-ret-cli --dry-run --locked

      - name: Publish soroban-ret-cli (binary)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_KEY }}
        run: cargo publish -p soroban-ret-cli --locked
